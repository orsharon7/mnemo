<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-label="Mnemo screenshot placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2b"/>
      <stop offset="100%" stop-color="#0f1218"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2530"/>
      <stop offset="100%" stop-color="#171b23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c9bff"/>
      <stop offset="100%" stop-color="#b07cff"/>
    </linearGradient>
  </defs>

  <rect width="960" height="600" rx="18" fill="url(#bg)"/>

  <g transform="translate(120, 90)">
    <rect width="720" height="420" rx="14" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>

    <circle cx="22" cy="22" r="6" fill="#ff5f57"/>
    <circle cx="42" cy="22" r="6" fill="#febc2e"/>
    <circle cx="62" cy="22" r="6" fill="#28c840"/>

    <rect x="20" y="56" width="680" height="36" rx="8" fill="rgba(255,255,255,0.06)"/>
    <text x="36" y="80" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="14" fill="#8a93a0">Search clipboard…</text>

    <g font-family="-apple-system, BlinkMacSystemFont, Helvetica, sans-serif" font-size="13" fill="#e6ebf2">
      <rect x="20" y="108" width="680" height="44" rx="8" fill="rgba(108,155,255,0.14)" stroke="rgba(108,155,255,0.35)"/>
      <text x="34" y="134">https://github.com/orsharon7/mnemo</text>
      <rect x="640" y="120" width="40" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
      <text x="649" y="134" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="11" fill="#9fb4ff">URL</text>

      <rect x="20" y="160" width="680" height="44" rx="8" fill="rgba(255,255,255,0.03)"/>
      <text x="34" y="186">{ "name": "Mnemo", "local": true }</text>
      <rect x="635" y="172" width="45" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
      <text x="643" y="186" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="11" fill="#ffc28b">JSON</text>

      <rect x="20" y="212" width="680" height="44" rx="8" fill="rgba(255,255,255,0.03)"/>
      <text x="34" y="238">func capture(_ pasteboard: NSPasteboard) -> Entry?</text>
      <rect x="636" y="224" width="44" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
      <text x="645" y="238" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="11" fill="#b8e3a5">CODE</text>

      <rect x="20" y="264" width="680" height="44" rx="8" fill="rgba(255,255,255,0.03)"/>
      <text x="34" y="290">hello@orsharon.dev</text>
      <rect x="632" y="276" width="48" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
      <text x="639" y="290" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="11" fill="#ffa3c0">EMAIL</text>

      <rect x="20" y="316" width="680" height="44" rx="8" fill="rgba(255,255,255,0.03)"/>
      <text x="34" y="342">Notes from yesterday's design review…</text>
      <rect x="638" y="328" width="42" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
      <text x="647" y="342" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="11" fill="#c9d2dd">TEXT</text>
    </g>

    <text x="20" y="396" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="11" fill="#6c7682">
      ↑↓ navigate · ⏎ paste · ⌘P pin · Space preview · Esc dismiss
    </text>
  </g>

  <text x="480" y="558" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica, sans-serif"
        font-size="14" fill="#6c7682">
    Mnemo screenshot
  </text>
</svg>
